<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>유럽 두 나라 여행 · 프랑스 · 스위스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gothic+A1:wght@400;500;700;900&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── 히어로 ── -->
  <header class="hero">
    <div class="hero-inner">
      <p class="hero-eyebrow" id="hero-eyebrow"></p>
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-sub" id="hero-sub"></p>
      <nav class="hero-nav">
        <a href="#map">약도</a>
        <a href="#timeline">일정</a>
        <a href="#gallery">모아보기</a>
      </nav>
    </div>
  </header>

  <!-- ── 약도 (맨 위 한 번) ── -->
  <section id="map" class="section map-section">
    <h2 class="section-title">여행 약도</h2>
    <p class="section-desc">방문한 도시를 순서대로 이어봤어요. 핀을 누르면 그날 일정으로 이동합니다.</p>
    <div class="map-wrap">
      <svg id="map-svg" viewBox="0 0 900 620" preserveAspectRatio="xMidYMid meet" role="img" aria-label="여행 약도"></svg>
    </div>
  </section>

  <!-- ── 일정 타임라인 ── -->
  <section id="timeline" class="section">
    <h2 class="section-title">일정 따라가기</h2>
    <p class="section-desc">출국부터 귀국까지, 흐름대로.</p>
    <div id="timeline-list" class="timeline"></div>
  </section>

  <!-- ── 전체 갤러리 ── -->
  <section id="gallery" class="section gallery-section">
    <h2 class="section-title">사진 모아보기</h2>
    <p class="section-desc">모든 사진을 한눈에.</p>
    <div id="gallery-grid" class="gallery-grid"></div>
  </section>

  <footer class="footer">
    <p>🇫🇷 🇨🇭 &nbsp;2026 유럽 두 나라 여행</p>
    <p class="footer-link">
      <a href="https://m.hanatour.com/trp/pkg/CHPC0PKG0200M100?prePage=CHPC0MPG0200M100&amp;pkgCd=EWP138260612OZS" target="_blank" rel="noopener noreferrer">🔗 여행 상품 보기 (하나투어)</a>
    </p>
  </footer>

  <!-- ── 라이트박스 ── -->
  <div id="lightbox" class="lightbox" hidden>
    <button class="lb-close" aria-label="닫기">&times;</button>
    <button class="lb-prev" aria-label="이전">&#8249;</button>
    <img class="lb-img" alt="" />
    <button class="lb-next" aria-label="다음">&#8250;</button>
    <p class="lb-caption"></p>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
